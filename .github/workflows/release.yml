name: release

# Tag a release to build standalone binaries for macOS and Windows and attach them
# to the GitHub Release: `git tag v0.2.0 && git push origin v0.2.0`.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e . pyinstaller

      - name: Build Windows .exe
        if: runner.os == 'Windows'
        run: pyinstaller --onefile --name weread-vault --collect-submodules weread_vault packaging/launch.py

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install innosetup --no-progress -y
          $version = "${{ github.ref_name }}"
          if ($version -match '^v?(\d+(\.\d+)*)$') { $version = $Matches[1] } else { $version = "0.0.0-dev" }
          $env:WEREAD_VAULT_VERSION = $version
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" packaging\windows.iss

      - name: Build macOS .app + .dmg (and a CLI binary)
        if: runner.os == 'macOS'
        run: |
          # CLI binary for terminal users (sync / update / …)
          pyinstaller --onefile --name weread-vault-macos --collect-submodules weread_vault packaging/launch.py
          # Double-clickable .app, ad-hoc signed (so it runs on Apple Silicon), packaged into a .dmg
          pyinstaller --noconfirm --windowed --name "WeRead Vault" --collect-submodules weread_vault packaging/launch.py
          codesign --force --deep --sign - "dist/WeRead Vault.app"
          hdiutil create -volname "WeRead Vault" -srcfolder "dist/WeRead Vault.app" -ov -format UDZO "dist/weread-vault-macos.dmg"

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/weread-vault.exe
            dist/weread-vault-windows-setup.exe
            dist/weread-vault-macos
            dist/weread-vault-macos.dmg

      - name: Upload as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: |
            dist/weread-vault.exe
            dist/weread-vault-windows-setup.exe
            dist/weread-vault-macos
            dist/weread-vault-macos.dmg
          if-no-files-found: ignore

  pypi:
    # Publish the package to PyPI so `pipx install weread-vault` / `uvx weread-vault` work.
    # Needs a repo secret PYPI_API_TOKEN (set it yourself: `gh secret set PYPI_API_TOKEN`).
    # Until the secret is set, the publish step is skipped — the job still succeeds.
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    env:
      PYPI_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade build
      - run: python -m build
      - name: Publish to PyPI
        if: env.PYPI_TOKEN != ''
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ env.PYPI_TOKEN }}
          skip-existing: true
